name: OKN Analytics Pipeline

on:
  # Trigger when data files are pushed
  push:
    paths:
      - 'data/**/*.csv'
      - 'data/**/*.json'

  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - ingest-only
          - report-only

  # Weekly schedule (every Monday 09:00 KST = 00:00 UTC)
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: 📊 Run Analytics Pipeline
    timeout-minutes: 15

    steps:
      - name: ☦️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Cache HuggingFace model (~118MB) between runs
      - name: 🧠 Cache ML models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-sentence-transformers-v1

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Prophet is optional
          pip install prophet 2>/dev/null || echo "Prophet not available, using statistical forecasting"

      - name: 🔬 Run analytics pipeline
        working-directory: ${{ github.workspace }}
        env:
          # Pre-download the model on first run, cached after
          SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          if [ "$MODE" = "ingest-only" ]; then
            python scripts/main.py --ingest-only
          elif [ "$MODE" = "report-only" ]; then
            python scripts/main.py --report-only
          else
            python scripts/main.py
          fi

      - name: 📤 Commit and push reports
        run: |
          git config user.name "OKN Analytics Bot"
          git config user.email "analytics@orthodoxkorea.org"
          
          git add reports/ || true
          git add history/ || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            POST_COUNT=$(python -c "
          import pandas as pd
          try:
              df = pd.read_csv('history/unified_history.csv')
              print(len(df))
          except:
              print('?')
          " 2>/dev/null || echo "?")
            
            git commit -m "📊 Analytics report — ${TIMESTAMP} (${POST_COUNT} posts)"
            git push
            echo "✅ Reports committed and pushed"
          fi

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy reports/ --project-name=okn-analytics

      - name: 📋 Pipeline summary
        if: always()
        run: |
          echo "## 📊 OKN Analytics Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "reports/latest_summary.json" ]; then
            python -c "
          import json
          with open('reports/latest_summary.json') as f:
              data = json.load(f)
          
          meta = data.get('meta', {})
          health = data.get('health', {})
          recs = data.get('recommendations', [])
          
          print(f'**Total Posts:** {meta.get(\"total_posts\", \"N/A\")}')
          print(f'**Platforms:** {\", \".join(meta.get(\"platforms\", []))}')
          print(f'**Health:** {health.get(\"emoji\", \"\")} {health.get(\"status\", \"unknown\").replace(\"_\", \" \").title()}')
          print()
          
          if recs:
              print('### 💡 Top Recommendations')
              print()
              for r in recs[:5]:
                  icon = {'high': '🔴', 'medium': '🟡', 'low': '🟢'}.get(r['priority'], '⚪')
                  print(f'- {icon} {r[\"message\"]}')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated — check pipeline logs" >> $GITHUB_STEP_SUMMARY
          fi
